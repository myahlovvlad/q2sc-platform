name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: q2sc
          POSTGRES_PASSWORD: q2sc_password
          POSTGRES_DB: q2sc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxrender1 libxext6

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install rdkit scikit-learn reportlab

      - name: Install worker_dft dependencies
        run: |
          pip install pyscf numpy scipy

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://q2sc:q2sc_password@localhost:5432/q2sc
          SYNC_DATABASE_URL: postgresql://q2sc:q2sc_password@localhost:5432/q2sc
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: test
          S3_BUCKET: q2sc-test
        run: |
          cd backend
          pytest tests/ -v --tb=short -q

  # ── Frontend type check + build ────────────────────────────────────────────
  frontend-build:
    name: Frontend TypeScript + Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run lint

      - name: Vite production build
        working-directory: frontend
        run: npm run build
